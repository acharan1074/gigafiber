<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="600" fill="#000000"/>
  
  <!-- V Shape with Orange and Blue -->
  <g>
    <!-- Orange V left side -->
    <polygon points="150,250 250,500 300,500 180,250" fill="#FF6B35"/>
    
    <!-- Blue inner V -->
    <polygon points="180,250 280,480 290,480 200,250" fill="#003DA5"/>
    
    <!-- Yellow V -->
    <polygon points="200,250 300,480 310,480 220,250" fill="#FFB81C"/>
    
    <!-- Orange V right side -->
    <polygon points="280,480 380,250 300,250 200,480" fill="#FF6B35"/>
  </g>
  
  <!-- Horizontal lines (fiber representation) -->
  <g stroke="#FF6B35" stroke-width="8" stroke-linecap="round">
    <line x1="400" y1="200" x2="900" y2="200"/>
    <line x1="410" y1="280" x2="890" y2="280"/>
    <line x1="400" y1="360" x2="900" y2="360"/>
  </g>
  
  <!-- Blue lines -->
  <g stroke="#003DA5" stroke-width="8" stroke-linecap="round">
    <line x1="400" y1="240" x2="900" y2="240"/>
    <line x1="410" y1="320" x2="890" y2="320"/>
  </g>
  
  <!-- Circles (connection points) -->
  <g fill="none" stroke="#FF6B35" stroke-width="4">
    <circle cx="900" cy="200" r="8"/>
    <circle cx="920" cy="240" r="8"/>
    <circle cx="920" cy="280" r="8"/>
  </g>
  
  <!-- WiFi signal indicator -->
  <g fill="#003DA5">
    <circle cx="950" cy="150" r="20"/>
    <path d="M 950 180 Q 930 210 910 240 Q 950 270 990 240 Q 970 210 950 180" fill="none" stroke="#FF6B35" stroke-width="8"/>
    <path d="M 950 200 Q 935 220 920 240 Q 950 260 980 240 Q 965 220 950 200" fill="none" stroke="#FF6B35" stroke-width="6"/>
  </g>
  
  <!-- GIGA FIBER Text -->
  <g>
    <!-- Tagline -->
    <text x="420" y="480" font-family="Arial, sans-serif" font-size="40" font-weight="bold" letter-spacing="2" fill="#FF6B35">NEXT-GEN SPEED,</text>
    <text x="850" y="480" font-family="Arial, sans-serif" font-size="40" font-weight="bold" letter-spacing="2" fill="#003DA5">NEXT-LEVEL SERVICE</text>
  </g>
</svg>